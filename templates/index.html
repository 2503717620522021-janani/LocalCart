<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LocalCart | Team PS070056</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; }
        .hero { background: #0056b3; color: white; padding: 30px; border-radius: 0 0 25px 25px; }
        .card-res { border-left: 5px solid #0056b3; transition: 0.3s; }
        .card-res:hover { transform: scale(1.02); }
    </style>
</head>
<body>
<div class="hero text-center shadow mb-4">
    <h1> LocalCart</h1>
    <p>Hyper-local Price Aggregator & Comparison Engine</p>
</div>

<div class="container">
    <div class="card p-4 shadow-sm border-0 mb-4">
        <div class="row g-3">
            <div class="col-md-3">
                <label class="fw-bold">1. City</label>
                <select id="city" class="form-select" onchange="resetAll()">
                    <option value="">-- Select --</option>
                    <option value="Coimbatore">Coimbatore</option>
                    <option value="Chennai">Chennai</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="fw-bold">2. Category</label>
                <select id="cat" class="form-select" onchange="loadProds()">
                    <option value="">-- Select --</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Dresses">Dresses</option>
                    <option value="Cosmetics">Cosmetics</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="fw-bold">3. Product</label>
                <select id="prod" class="form-select"><option value="">-- Choose Category --</option></select>
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button onclick="find()" class="btn btn-primary w-100 fw-bold">COMPARE DEALS</button>
            </div>
        </div>
    </div>
    <div id="results" class="row"></div>
</div>

<script>
    function resetAll() { 
        document.getElementById('cat').value = ""; 
        document.getElementById('prod').innerHTML = '<option value="">-- Choose Category --</option>';
    }
    async function loadProds() {
        let city = document.getElementById('city').value;
        let cat = document.getElementById('cat').value;
        let fd = new FormData(); fd.append('city', city); fd.append('category', cat);
        let res = await fetch('/get_products', {method: 'POST', body: fd});
        let data = await res.json();
        let h = '<option value="">-- Select Product --</option>';
        data.products.forEach(p => h += `<option value="${p}">${p}</option>`);
        document.getElementById('prod').innerHTML = h;
    }
    async function find() {
        let city = document.getElementById('city').value;
        let prod = document.getElementById('prod').value;
        let fd = new FormData(); fd.append('city', city); fd.append('product', prod);
        let res = await fetch('/search_deals', {method: 'POST', body: fd});
        let data = await res.json();
        let h = '';
        data.stores.forEach(s => {
            h += `<div class="col-md-6 mb-3"><div class="card card-res shadow-sm"><div class="card-body">
            <h5 class="text-primary">${s.store_name}</h5>
            <h2 class="text-danger">₹${s.price}</h2>
            <p class="badge bg-warning text-dark">Offer: ${s.offer_details}</p>
            <p class="mb-0 text-muted small">Distance: ${s.distance_km} km away</p>
            </div></div></div>`;
        });
        document.getElementById('results').innerHTML = h;
    }
</script>
</body>

</html>
